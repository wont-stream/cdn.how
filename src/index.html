<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CDN, how?</title>

    <meta name="description" content="This, is not a CDN.">

    <style>
        @import url("https://static.cdn.how/circularstd/_.css");

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        * {
            font-family: "Circular Std";
            color: #DEDEDE
        }

        .scroll-container {
            height: 100vh;
            /* Full viewport height for the container */
            overflow-y: scroll;
            /* Enable vertical scrolling */
            scroll-snap-type: y mandatory;
            /* Enable snapping */
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            /* Full viewport height */
            overflow: hidden;
            scroll-snap-align: start;
        }

        #bg {
            display: block;
            /* Remove default inline-block space */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            align-content: center;
            left: 50%;
            position: absolute;
            text-align: center;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes scroll {
            0% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(60px);
            }
        }

        svg #wheel {
            animation: scroll ease 2s infinite;
        }

        .spacer {
            margin-left: 10px;
            margin-right: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="scroll-container">
        <div class="hero">
            <div id="bg"></div>
            <div class="content">
                <h1>This, is not a CDN.</h1>

                    style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
                    <path id="wheel" d="M123.359,79.775l0,72.843" style="fill:none;stroke:#fff;stroke-width:20px;" />
                    <path id="mouse"
                        d="M236.717,123.359c0,-62.565 -50.794,-113.359 -113.358,-113.359c-62.565,0 -113.359,50.794 -113.359,113.359l0,143.237c0,62.565 50.794,113.359 113.359,113.359c62.564,0 113.358,-50.794 113.358,-113.359l0,-143.237Z"
                        style="fill:none;stroke:#fff;stroke-width:20px;" />
                </svg>

        </div>

        <div class="hero">

                        style="fill:none;stroke:#fff;stroke-width:20px;" />

        <div class="hero">
